<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenWord - Custom CSS</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.2/mammoth.browser.min.js"></script>
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="app-header">
        <div class="header-left">
            <div class="logo">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
            </div>
            <input type="text" id="doc-title" class="doc-title-input" value="Untitled Document">
        </div>

        <div class="header-actions no-print">
            <label class="btn">
                Import .docx
                <input type="file" id="upload" accept=".docx" style="display: none;">
            </label>
            <button class="btn" onclick="downloadHTML()">Save as HTML</button>
            <button class="btn btn-primary" onclick="window.print()">Save as PDF</button>
        </div>
    </header>

    <nav class="tab-bar no-print" id="tab-bar"></nav>

    <main class="main-workspace">
        <div class="editor-paper">
            <div id="editor-container"></div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
